<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/edit">Edit Players</a>
    </nav>
    <main>
        <h1>🏆 Leaderboard</h1>
        <p id="status">Loading scores...</p>
        <table id="scoreTable" style="display:none;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Score</th>
                    <th>Wins</th>
                    <th>Losses</th>
                    <th>Games Played</th>
                    <th>Game</th>
                </tr>
            </thead>
            <tbody id="scoreBody"></tbody>
        </table>
    </main>
    <script src="/js/loadscores.js"></script>
</body>
</html>
